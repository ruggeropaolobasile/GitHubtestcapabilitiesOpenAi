name: demo-ci

on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show repository files
        run: |
          echo "Listing repo files"
          find . -maxdepth 3 -type f | sort

      - name: Smoke test node example
        run: node -e "const { buildResponse } = require('./examples/node/sample-api'); const r = buildResponse('/health'); if (r.status !== 200) process.exit(1); console.log(r.body);"
